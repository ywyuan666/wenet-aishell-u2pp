name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchaudio soundfile PyYAML

      - name: Verify project structure
        run: |
          echo "=== Scripts ===" && ls scripts/
          echo "=== Tools ===" && ls tools/
          echo "=== Benchmarks ===" && ls benchmark/
          echo "=== Results ===" && ls results/

      - name: Shell syntax check
        run: |
          bash -n env_autodl.sh && echo "env_autodl.sh: OK"
          for f in scripts/*.sh; do bash -n "$f" && echo "$f: OK"; done

      - name: Python syntax check
        run: |
          python -c "
import ast
files = [
    'tools/make_subset_data_list.py',
    'tools/jsonl_to_wenet_data.py',
    'tools/summarize_wenet_results.py',
    'eval_cer.py',
    'run_eval.py',
]
for f in files:
    try:
        with open(f) as fh:
            ast.parse(fh.read())
        print(f'{f}: OK')
    except SyntaxError as e:
        print(f'{f}: FAIL - {e}')
        raise
"
          echo "All Python files syntax OK"

      - name: Verify requirements.txt valid
        run: |
          pip install -r requirements.txt --dry-run 2>&1 | head -5 || echo "Dry-run check completed"
          echo "requirements.txt is valid"

      - name: Check results files
        run: |
          for f in results/*.md results/*.csv; do
            [ -s "$f" ] && echo "$f: $(wc -c < $f) bytes" || echo "WARNING: $f is empty"
          done

      - name: Install WeNet (CPU)
        run: |
          cd wenet
          grep -vE '^(torch|torchaudio|deepspeed)' requirements.txt > /tmp/req.txt
          pip install -r /tmp/req.txt
          pip install -e . --no-deps

      - name: Verify WeNet import
        run: |
          python -c "
import wenet
print('WeNet imported successfully')
# Verify core modules
from wenet.transformer.asr_model import ASRModel
print('ASRModel imported: OK')
from wenet.transformer.conformer import ConformerEncoder
print('ConformerEncoder imported: OK')
from wenet.utils.init_model import init_model
print('init_model imported: OK')
print('All core modules verified!')
"
